<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Old City Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --dark: #0D0D0D;
            --darker: #070707;
            --cream: #F5F0E8;
            --warm-white: #FAF8F5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--darker); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .flash-messages { position: fixed; top: 30px; right: 30px; z-index: 9999; }
        .flash-message { padding: 15px 25px; margin-bottom: 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; animation: slideIn 0.5s ease; }
        .flash-error { background: rgba(184, 84, 80, 0.9); color: white; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .login-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(201, 168, 76, 0.1); border-radius: 8px; padding: 60px; width: 100%; max-width: 450px; }
        .login-logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--gold); text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
        .login-logo span { color: var(--cream); font-weight: 400; }
        .login-subtitle { text-align: center; color: rgba(245, 240, 232, 0.5); font-size: 0.9rem; margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        .form-group input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(201, 168, 76, 0.15);
            color: var(--cream); font-family: 'Inter', sans-serif; font-size: 1rem; transition: all 0.3s; border-radius: 4px;
        }
        .form-group input:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.05); }
        .btn-login {
            width: 100%; background: var(--gold); color: var(--dark); padding: 16px;
            font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            border: none; cursor: pointer; transition: all 0.4s; font-family: 'Inter', sans-serif; border-radius: 4px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3); }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: rgba(245, 240, 232, 0.5); text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .back-link a:hover { color: var(--gold); }
    </style>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-messages">
      {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="login-container">
    <div class="login-logo">Old City <span>Admin</span></div>
    <p class="login-subtitle">Restaurant Management Panel</p>
    <form action="{{ url_for('admin_login') }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn-login">Login</button>
    </form>
    <div class="back-link">
        <a href="{{ url_for('home') }}">← Back to Website</a>
    </div>
</div>

<script>
    setTimeout(() => {
        document.querySelectorAll('.flash-message').forEach(msg => {
            msg.style.transition = 'opacity 0.5s';
            msg.style.opacity = '0';
            setTimeout(() => msg.remove(), 500);
        });
    }, 5000);
</script>

</body>
</html>
